# On-Premise Agent Configuration Sample 
# IMPORTANT: Keep this file secure! 
# To use: cp sample.env.conf .env

# ============================================================================
# SNOWFLAKE CONNECTION
# ============================================================================

# Snowflake WebSocket URL (UPDATED with your actual endpoint!)
# From: SHOW ENDPOINTS IN SERVICE websocket_multi_db_service;
# WebSocket endpoint: 
SNOWFLAKE_URL=wss://XXXX.snowflakecomputing.app

# ============================================================================
# SNOWFLAKE AUTHENTICATION (Production)
# ============================================================================

# Programmatic Access Token (PAT)
SNOWFLAKE_PAT=

# Snowflake Account
SNOWFLAKE_ACCOUNT=

# Optional: Specify role for token scoping
SNOWFLAKE_ROLE=

# Optional: Full account URL (usually not needed)
SNOWFLAKE_ACCOUNT_URL=https://XXX.snowflakecomputing.com

# ============================================================================
# TCP PROXY - NO CONFIGURATION NEEDED!
# ============================================================================
# Routing is configured in Snowflake (CREATE SERVICE with PG_HOST and PG_PORT)
# The on-premise agent is a pure proxy with no default target

# Database credentials for query forwarding mode
DB_NAME=test_db
DB_USER=kevin
DB_PASSWORD=

# ============================================================================
# USAGE
# ============================================================================

# 1. Get Snowflake endpoint URL:
#    In Snowflake SQL: SHOW ENDPOINTS IN SERVICE tunnel_service;
#    Copy the websocket endpoint URL
#
# 2. Update SNOWFLAKE_URL above with the endpoint
#
# 3. Update DB_* settings with your database details
#
# 4. Copy this file:
#    cp config.kevin.env .env
#    chmod 600 .env
#
# 5. Run agent:
#    docker run -d --name onpremise-agent --env-file .env onpremise-agent:latest
#

